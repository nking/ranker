# USAGE:
#   export PROJECT_ROOT=$(pwd)/../../ && envsubst '$PROJECT_ROOT' < dbsr.yaml | kubectl apply -f -
# Sets the variable, pipes the YAML through envsubst, and passes it to kubectl via stdin (-)
# to add another env var, separate the exports by semi-colons
#
# To access gcs-service:4443 or db-service:5432 from the host machine 
# (outside the cluster) during development, map these specific ports 
# in the kind cluster-config.yaml using the extraPortMappings directive 
# booting the cluster.
# booting the cluster.
#
# this file is read by kubectl.
# no need for persistent volumes for use in run_app.shl, but could be changed for that.
#
#defin a namespace:
apiVersion: v1
kind: Namespace
metadata:
  name: ranker-ns
---
# CONFIGMAP (Replaces your .env file and static environment variables)
apiVersion: v1
kind: ConfigMap
metadata:
  name: app-runner-env
  namespace: ranker-ns
data:
  # Placeholders for the variables .env file
  POSTGRES_USER: "your-db-user"
  POSTGRES_PASSWORD: "your-db-password"
  UID: "1000"
  GID: "1000"
  GOOGLE_CLOUD_PROJECT: "local-kfp-dev"
  GCSFS_ENDPOINT_URL: "http://gcs-service:4443"
  TENSORSTORE_GCS_HTTP_URL: "http://gcs-service:4443"
  STORAGE_EMULATOR_HOST: "http://gcs-service:4443"
  CLOUD_STORAGE_EMULATOR_HOST: "http://gcs-service:4443"
  CLOUD_STORAGE_EMULATOR_ENDPOINT: "http://gcs-service:4443"
  TENSORSTORE_GCS_NO_AUTH: "1"
  NO_GCE_CHECK: "true"
  GCS_LAMBDA_TOKEN: ""
  GOOGLE_AUTH_SUPPRESS_CREDENTIALS_WARNINGS: "true"
  STORAGE_EMULATOR_HOST_HTTP: "true"
  GOOGLE_AUTH_EXTERNAL_ACCOUNT_TOKEN_PROHIBIT: "true"
  GOOGLE_APPLICATION_CREDENTIALS: ""
  TENSORSTORE_GCS_REQUEST_CONCURRENCY: "32"
---
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: pg-init-script
  namespace: ranker-ns
data:
  init-databases.sh: |
    #!/bin/bash
    set -e
    
    # Connect to the default 'postgres' db to create the others
    psql -v ON_ERROR_STOP=1 --username "$POSTGRES_USER" --dbname "postgres" <<-EOSQL
        SELECT 'CREATE DATABASE mlflow_db' WHERE NOT EXISTS (SELECT FROM pg_database WHERE datname = 'mlflow_db')\gexec
        GRANT ALL PRIVILEGES ON DATABASE mlflow_db TO "$POSTGRES_USER";
        SELECT 'CREATE DATABASE xmngr_db' WHERE NOT EXISTS (SELECT FROM pg_database WHERE datname = 'xmngr_db')\gexec
        GRANT ALL PRIVILEGES ON DATABASE xmngr_db TO "$POSTGRES_USER";
    EOSQL
---
# ==========================================
# GCS EMULATOR
# ==========================================
# ==========================================
# GCS EMULATOR
# ==========================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gcs-emulator
  namespace: ranker-ns
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gcs-emulator
  template:
    metadata:
      labels:
        app: gcs-emulator
    spec:
      containers:
      - name: gcs-emulator
        image: fsouza/fake-gcs-server:1.54.0
        imagePullPolicy: IfNotPresent
        env:
        - name: CLOUD_STORAGE_EMULATOR_HOST
          valueFrom:
            configMapKeyRef:
              name: app-runner-env
              key: CLOUD_STORAGE_EMULATOR_HOST
        command: ["sh", "-c"]
        args: 
        - |
          echo 'Cleaning old checkpoints...';
          rm -rf /storage/fake-gcs-server/checkpoint-bucket/*;
          # Fixed from ${PROJECT_ROOT}/fake-gcs-server to the internal container path
          exec /bin/fake-gcs-server -scheme http -backend filesystem -data /storage -public-host gcs-service:4443 -external-url http://gcs-service:4443
        ports:
        - containerPort: 4443
        volumeMounts:
        - name: gcs-storage
          mountPath: /storage   # Clean mount point mapping
        readinessProbe: 
          httpGet:
            path: /storage/v1/b
            port: 4443
          initialDelaySeconds: 5
          periodSeconds: 5
      volumes:
      - name: gcs-storage
        hostPath:
          path: /mnt/gcs-data  # Points to the containerPath defined in kind-cluster.yaml
          type: Directory      # Confirms the directory exists on the Kind Node
---
apiVersion: v1
kind: Service
metadata:
  name: gcs-service
  namespace: ranker-ns
spec:
  type: NodePort
  selector:
    app: gcs-emulator
  ports:
    - protocol: TCP
      port: 4443  # internal cluster port used by other pods
      targetPort: 4443 # postgres container listnes on this port
      nodePort: 30433  # MUST match the containerPort in kind-cluster.yaml
---
# ==========================================
# 2. POSTGRES DATABASE
# ==========================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: local-db-store
  namespace: ranker-ns
spec:
  replicas: 1
  selector:
    matchLabels:
      app: local-db-store
  template:
    metadata:
      labels:
        app: local-db-store
    spec:
      containers:
      - name: postgres
        image: postgres:12-alpine
        imagePullPolicy: IfNotPresent
        args: ["-c", "shared_buffers=128MB", "-c", "max_connections=20", "-c", "work_mem=4MB"]
        env:
        - name: POSTGRES_USER
          valueFrom:
            secretKeyRef:
              name: graphranker-db-credentials
              key: username
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: graphranker-db-credentials
              key: password
        - name: POSTGRES_DB
          value: "postgres"
        ports:
        - containerPort: 5432
        volumeMounts:
        - name: pg-data
          mountPath: /var/lib/postgresql/data
        - name: pg-init
          mountPath: /docker-entrypoint-initdb.d/
          readOnly: true
      volumes:
      - name: pg-data
        emptyDir: {}
      - name: pg-init
        configMap:
          name: pg-init-script
          defaultMode: 0755 # Gives the script executable permissions
---
apiVersion: v1
kind: Service
metadata:
  name: db-service
  namespace: ranker-ns
spec:
  type: NodePort # opens a static port on the node
  selector:
    app: local-db-store
  ports:
    - protocol: TCP
      port: 5432  # internal cluster port used by other pods
      targetPort: 5432 # postgres container listnes on this port
      nodePort: 30432  # MUST match the containerPort in kind-cluster.yaml
---
# ==========================================
# 3. VIZIER SERVER
# ==========================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vizier-server
  namespace: ranker-ns
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vizier-server
  template:
    metadata:
      labels:
        app: vizier-server
    spec:
      containers:
      - name: vizier-server
        image: ranker-vizier_server:latest # Must be built and loaded into kind first
        imagePullPolicy: Never
        env:
        - name: VIZIER_DATABASE_URL
          value: "sqlite:////app/data/vizier.db"
        ports:
        - containerPort: 8080
        volumeMounts:
        - name: vizier-data
          mountPath: /app/data
      volumes:
      - name: vizier-data
        hostPath:
          path: ${PROJECT_ROOT}/sqlite-data
          type: DirectoryOrCreate
---
apiVersion: v1
kind: Service
metadata:
  name: vizier-service
  namespace: ranker-ns
spec:
  type: NodePort
  selector:
    app: vizier-server
  ports:
    - protocol: TCP
      port: 8000  # internal cluster port used by other pods
      targetPort: 8080 # postgres container listens on this port
      nodePort: 30434  # MUST match the containerPort in kind-cluster.yaml
