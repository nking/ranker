services:
  cross-encoder:
    #24.xx containers for TF 2.16.1
    image: nvcr.io/nvidia/tritonserver:26.04-py3
    container_name: cross-encoder
    restart: unless-stopped
    ports:
      - "172.17.0.1:8510:8000" # gRPC port
      - "172.17.0.1:8511:8001" # REST API port
      - "172.17.0.1:8512:8002" # metrics
    environment:
      - MODEL_NAME=graph-ranker
    volumes:
      - ./src/test/resources/model_repositories/cross-encoder:/models/
    command: [ "tritonserver", "--model-repository=/models" ]
    healthcheck:
      # Triton has a built-in health endpoint. this is executed inside the container
      test: [ "CMD", "curl", "-f", "http://localhost:8500/v2/health/ready" ]
      interval: 10s
      timeout: 5s
      retries: 3