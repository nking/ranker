#USAGE
#  docker compose --project-directory . -f deploy/compose/docker-compose-TFS.yaml up -d
#     the project_directory flag ensure the file paths are all relative to that directory
services:
  tfs-bi-encoder:
    #24.xx containers for TF 2.16.1
    image: tensorflow/serving:2.16.1
    container_name: tfs-bi-encoder
    restart: unless-stopped
    ports:
      - "172.17.0.1:8500:8500" # gRPC port
      - "172.17.0.1:8501:8501" # REST API port
    environment:
      - MODEL_NAME=two-tower
    volumes:
      - ./src/test/resources/savedmodels/two-tower:/models/two-tower
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8501/v1/models/two-tower" ]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
      #can check in browser with: http://172.17.0.1:8501/v1/models/two-tower

  tfs-cross-encoder:
    image: tensorflow/serving:2.20.0
    container_name: tfs-cross-encoder
    restart: unless-stopped
    ports:
      - "172.17.0.1:8510:8500" # gRPC port
      - "172.17.0.1:8511:8501" # REST API port
    environment:
      - MODEL_NAME=graph-ranker
    volumes:
      - ./src/test/resources/savedmodels/graph-ranker:/models/graph-ranker
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8501/v1/models/graph-ranker" ]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
      #can check in browser with: http://172.17.0.1:8511/v1/models/graph-ranker