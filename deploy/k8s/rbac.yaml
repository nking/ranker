apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: kfp-trainjob-manager
  namespace: ranker-ns
rules:
- apiGroups: ["trainer.kubeflow.org"]
  resources: ["trainjobs"]
  verbs: ["create", "get", "list", "watch", "delete", "patch", "update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: kfp-trainjob-binding
  namespace: ranker-ns
subjects:
- kind: ServiceAccount
  name: pipeline-runner
  namespace: kubeflow
- kind: ServiceAccount
  name: default
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: kfp-trainjob-manager
