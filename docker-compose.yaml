services:
  gcs:
    image: fsouza/fake-gcs-server
    container_name: gcs_emulator
    env_file:
      - .env
    user: "${UID}:${GID}" # Passes your host user ID to avoid permission issues
    ports:
      - "127.0.0.1:4443:4443"
    volumes:
      - ./fake_gcs_server_buckets:/storage
    # We use -external-url to ensure TensorStore/Orbax get the right redirect address
    command: >
      -scheme http 
      -backend filesystem 
      -data /storage 
      -public-host gcs:4443
      -external-url http://gcs:4443
    healthcheck:
      #test: [ "CMD", "curl", "-f", "http://localhost:4443/storage/v1/b" ]
      test: [ "CMD", "curl", "-f", "http://localhost:4443/storage/v1/b/data/o" ]
      interval: 5s
      timeout: 5s
      retries: 5

  db:
    #12-alpine should be compatible with SQLAlchemy==1.2.19 and 2.0.49
    image: postgres:12-alpine
    container_name: local_db_store
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: mlflow_db
        # Our custom variable for the init script
        - POSTGRES_MULTIPLE_DATABASES=optuna_db,orbax_db
    ports:
      - "127.0.0.1:5432:5432" # Bind to localhost ONLY (secures it from external world)
    command: >
      postgres
      -c shared_buffers=128MB 
      -c max_connections=20
      -c work_mem=4MB
    volumes:
      #host:container
      - ./bin/postgres_data:/var/lib/postgresql/data
      # Mount the init script into the special entrypoint directory
      - ./init-databases.sh:/docker-entrypoint-initdb.d/init-databases.sh:ro

  app:
    build:
      context: .
      dockerfile: Dockerfile_cpu
    container_name: run_optuna_trial_train_fn
    depends_on:
      #TODO: in production, use a health check that db server is ready
      - db
      - gcs
    env_file:
      - .env
    environment:
      - GOOGLE_CLOUD_PROJECT=${GOOGLE_CLOUD_PROJECT}
      - TENSORSTORE_GCS_HTTP_ENDPOINT=${TENSORSTORE_GCS_HTTP_ENDPOINT}
      - STORAGE_EMULATOR_HOST=${STORAGE_EMULATOR_HOST}
      - CLOUD_STORAGE_EMULATOR_HOST=${CLOUD_STORAGE_EMULATOR_HOST}
      - CLOUD_STORAGE_EMULATOR_ENDPOINT=${CLOUD_STORAGE_EMULATOR_ENDPOINT}
      - TENSORSTORE_GCS_NO_AUTH=${TENSORSTORE_GCS_NO_AUTH}
      - NO_GCE_CHECK=${NO_GCE_CHECK}
      - GCS_LAMBDA_TOKEN=${GCS_LAMBDA_TOKEN}
      - GOOGLE_AUTH_SUPPRESS_CREDENTIALS_WARNINGS=${GOOGLE_AUTH_SUPPRESS_CREDENTIALS_WARNINGS}
      - STORAGE_EMULATOR_HOST_HTTP=${STORAGE_EMULATOR_HOST_HTTP}
      - GOOGLE_AUTH_EXTERNAL_ACCOUNT_TOKEN_PROHIBIT=${GOOGLE_AUTH_EXTERNAL_ACCOUNT_TOKEN_PROHIBIT}
      - GOOGLE_APPLICATION_CREDENTIALS=${GOOGLE_APPLICATION_CREDENTIALS}
