[build-system]
requires = ["setuptools>=72", "wheel", "tomli"]
build-backend = "setuptools.build_meta"
[project]
name = "movie_lens_ranker"
version = "0.1.0"
description = "Ranker class for Kaggle recommender systems project"
authors = [
    { name = "Nichole King" },
]
#readme = "README.md"
#requires-python = ">=3.11.0,<3.12"
requires-python = ">=3.12.0,<3.13"
dependencies = [
  'jax-ai-stack==2025.10.28', 
  'rax==0.4.0', 
  'jraph @ git+https://github.com/deepmind/jraph.git@51f5990104f7374492f8f3ea1cbc47feb411c69c',
  'jraphx==0.0.4',
  'mlflow-skinny==3.11.1',
  'psycopg2-binary==2.9.12',
  'gcsfs==2026.2.0',
  "google-vizier[jax]==0.1.24",
  "numba-0.65.1",
  #then install equinox==0.13.2 alembic==1.18.4 afterwards
  #then install orbax-checkpoint-0.11.39
]
readme = "README.md"
license = "MIT"

classifiers = [
  #   3 - Alpha
  #   4 - Beta
  #   5 - Production/Stable
  "Development Status :: 1 - development",
]


[tool.setuptools]

[tool.setuptools.packages.find]
where = ["src/main/python"]
include = ['movie_lens_ranker',]
#exclude = ["tests"]

[project.urls]
Homepage = "https://www.kaggle.com/code/nicholeasuniquename/ranker/"
Repository = "https://github.com/nking/ranker.git"

[project.optional-dependencies]
#test = ["pytest", ]
